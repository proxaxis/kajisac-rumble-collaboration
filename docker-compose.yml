services:
  app:
    image: node:24.12.0
    container_name: kajisac_rumble_collaboration_app
    user: node
    working_dir: /app
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./app:/app
    ports:
      - "4321:8000"
    command: sleep infinity